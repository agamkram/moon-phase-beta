<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030408">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Moon</title>
  <link rel="preload" href="moon.jpg?v=4096e" as="image" type="image/jpeg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@500;600&display=swap');

    html {
      height: 100%;
      background: #020308;
    }

    body {
      margin: 0;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #020308;
    }

    #sky {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
      top: calc(-1 * env(safe-area-inset-top, 0px));
      left: calc(-1 * env(safe-area-inset-left, 0px));
      right: calc(-1 * env(safe-area-inset-right, 0px));
      bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
      min-width: 100vw;
      min-height: 100lvh;
      min-height: -webkit-fill-available;
      background:
        radial-gradient(ellipse 130% 95% at 38% 18%, #121a2f 0%, #080c16 42%, #020308 100%);
    }

    #starfield {
      display: block;
      margin: 0;
      padding: 0;
      border: 0;
      vertical-align: top;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      max-height: 100dvh;
      box-sizing: border-box;
      padding:
        max(0.5rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(0.5rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 0.35rem;
      overflow-x: visible;
      overflow-y: hidden;
    }

    .app-footer {
      min-height: 0;
    }

    .title-font {
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .moon-halo {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      box-shadow:
        0 16px 36px -14px rgb(0 0 0 / 0.32),
        0 0 16px rgba(255, 252, 245, 0.15),
        0 0 32px rgba(225, 236, 255, 0.32),
        0 0 64px rgba(195, 215, 255, 0.19),
        0 0 100px rgba(170, 195, 255, 0.08);
    }

    .moon-wrap {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
    }

    .stat-label {
      font-size: 0.625rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      line-height: 1.2;
    }

    @media (min-width: 640px) {
      .stat-label {
        font-size: 0.75rem;
        letter-spacing: 0.5px;
      }
    }

    .stat-card {
      min-width: 0;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    @media (min-width: 640px) {
      .stat-value {
        font-size: 1.875rem;
      }
    }

    .stat-unit {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.625rem;
      font-weight: 300;
      color: rgb(161 161 170);
      line-height: 1;
    }

    @media (min-width: 640px) {
      .stat-unit {
        font-size: 0.875rem;
      }
    }

    .moon-column {
      min-height: 0;
      min-width: 0;
      width: 100%;
      margin: 0 !important;
      padding-inline: 1.75rem;
      box-sizing: border-box;
      overflow: visible;
    }

    body.moon-zoomed {
      overflow: visible;
    }

    body.moon-zoomed .app-shell {
      overflow: visible;
    }

    body.moon-zoomed .moon-column {
      z-index: 20;
    }

    .moon-scene {
      position: relative;
      width: min(54vmin, 320px);
      max-width: 100%;
      aspect-ratio: 1;
      height: auto;
      flex-shrink: 0;
      transform-origin: center center;
    }

    @media (min-width: 768px) {
      .moon-scene {
        width: min(48vmin, 360px);
      }
    }

    #phase-slider {
      display: block;
      width: 100%;
      min-height: 44px;
      margin: 0;
      cursor: pointer;
      touch-action: pan-y;
    }

    .slider-wrap {
      padding: 0.35rem 0 0.15rem;
    }

    @media (max-width: 767px) {
      .app-header {
        margin-bottom: 0 !important;
        gap: 0.5rem !important;
      }

      .app-header h1 {
        font-size: 1.5rem;
        line-height: 1.1;
      }

      .stat-value {
        font-size: 1.25rem;
      }

      .stat-card {
        padding-top: 0.5rem;
        padding-bottom: 0.5rem;
      }

      .app-footer {
        gap: 0.5rem;
      }

      .app-footer .footer-controls {
        margin-top: 0.5rem;
        gap: 0.65rem;
      }

      #moon-date {
        margin-top: 0.35rem !important;
      }
    }

    @media (min-width: 768px) {
      .app-shell {
        gap: 0.5rem;
        padding-top: max(0.75rem, env(safe-area-inset-top));
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      }
    }

    .moon-scene.is-zoomed {
      z-index: 20;
    }

    #moon-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hem-btn {
      padding: 0.55rem 0.75rem;
      border-radius: 0.75rem;
      border: 1px solid rgb(39 39 42);
      background: rgb(24 24 27 / 0.6);
      color: rgb(212 212 216);
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .hem-btn:hover {
      color: rgb(244 244 245);
      background: rgb(39 39 42 / 0.8);
    }

    .hem-btn.active {
      background: rgb(63 63 70);
      border-color: rgb(82 82 91);
      color: rgb(250 250 250);
    }

    .live-btn {
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.625rem;
      font-weight: 500;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    @media (min-width: 640px) {
      .live-btn {
        font-size: 0.75rem;
      }
    }

    .live-btn.is-live {
      color: rgb(113 113 122);
      background: transparent;
    }

    .live-btn.is-preview {
      color: rgb(250 250 250);
      background: rgb(63 63 70);
      border-color: rgb(82 82 91);
    }

    .live-btn.is-preview:hover {
      background: rgb(82 82 91);
    }

  </style>
</head>
<body class="text-white">
  <div id="sky" aria-hidden="true">
    <canvas id="starfield"></canvas>
  </div>

  <div class="app-shell max-w-[720px] mx-auto">
    <div class="app-header flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between sm:mb-2 px-1">
      <div>
        <h1 class="title-font text-3xl sm:text-4xl tracking-tighter">The Moon</h1>
      </div>
      <div id="phase-name"
           class="self-start sm:self-auto inline-flex items-center px-3 py-1 rounded-full bg-zinc-900 border border-zinc-800 text-sm font-medium text-zinc-300">
        —
      </div>
    </div>

    <div class="moon-column flex justify-center items-center">
      <div class="moon-scene">
        <div class="moon-halo">
          <div class="moon-wrap">
            <canvas id="moon-canvas" aria-label="Moon phase rendering"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="app-footer px-1">
    <div class="grid grid-cols-3 gap-2 sm:gap-3">
      <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl px-2.5 py-3 sm:px-4 sm:py-4">
        <div class="stat-label text-zinc-500 mb-1.5">Illumination</div>
        <div class="stat-value text-white" id="illumination">—</div>
        <div class="stat-unit">percent</div>
      </div>

      <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl px-2.5 py-3 sm:px-4 sm:py-4">
        <div class="stat-label text-zinc-500 mb-1.5">Age</div>
        <div class="stat-value text-white" id="moon-age">—</div>
        <div class="stat-unit">days</div>
      </div>

      <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl px-2.5 py-3 sm:px-4 sm:py-4">
        <div class="stat-label text-zinc-500 mb-1.5">To Full</div>
        <div class="stat-value text-white" id="days-to-full">—</div>
        <div class="stat-unit">days</div>
      </div>
    </div>

    <p id="moon-date" class="text-center text-sm sm:text-base text-zinc-400 mt-2">—</p>

    <div class="footer-controls mt-3 sm:mt-4 space-y-3 sm:space-y-4">
      <div>
        <div class="stat-label text-zinc-500 mb-2">Hemisphere</div>
        <div class="grid grid-cols-2 gap-2">
          <button type="button" id="hem-north" class="hem-btn active">Northern</button>
          <button type="button" id="hem-south" class="hem-btn">Southern</button>
        </div>
      </div>

      <div class="flex items-center justify-between mb-2">
        <label for="phase-slider" class="stat-label text-zinc-500">Preview phase</label>
        <button type="button" id="reset-slider" class="live-btn is-live">Live</button>
      </div>
      <div class="slider-wrap">
        <input type="range" id="phase-slider" min="0" max="1000" value="0" step="1"
               class="w-full accent-zinc-300">
      </div>
      <p id="slider-label" class="text-[10px] sm:text-xs text-zinc-600 mt-1">Live phase</p>
    </div>
    </div>
  </div>

  <canvas id="moon-texture" aria-hidden="true" style="position:fixed;left:-9999px;width:0;height:0;visibility:hidden"></canvas>

  <script src="astronomy.js"></script>
  <script>
    const SYNODIC = 29.530588853;
    const MOON_SRC = 'moon.jpg?v=4096e';
    const TEXTURE_SIZE = 4096;
    const EARTHSHINE = 0.55;
    let northernHemisphere = true;

    function moonCssSize() {
      const wrap = document.querySelector('.moon-wrap');
      const cssW = wrap ? wrap.getBoundingClientRect().width : 0;
      if (cssW > 0) return cssW;
      return Math.min(window.innerWidth * 0.78, 360);
    }

    function moonDpr() {
      return Math.min(window.devicePixelRatio || 1, 3);
    }

    function computeMoonSize() {
      return Math.min(TEXTURE_SIZE, Math.max(256, Math.ceil(moonCssSize() * moonDpr())));
    }

    function computeRenderSize() {
      return Math.min(TEXTURE_SIZE, Math.max(256, Math.round(computeMoonSize() * moonZoom)));
    }
    let lastPhase = 0.5;
    let lastIllum = 1;
    const MIN_MOON_ZOOM = 1;
    const MAX_MOON_ZOOM = 3;
    let moonZoom = 1;
    const textureCanvas = document.getElementById('moon-texture');
    const textureCtx = textureCanvas.getContext('2d');

    function getMoonData(date = new Date()) {
      const illum = Astronomy.Illumination(Astronomy.Body.Moon, date);
      return {
        phase: Astronomy.MoonPhase(date) / 360,
        fraction: illum.phase_fraction,
      };
    }

    function phaseIllum(phase) {
      return (1 - Math.cos(phase * Math.PI * 2)) / 2;
    }

    function daysToFull(phase) {
      return phase < 0.5 ? (0.5 - phase) * SYNODIC : (1.5 - phase) * SYNODIC;
    }

    function formatDate(date) {
      return date.toLocaleDateString(undefined, {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
      });
    }

    function phaseDelta(from, to) {
      let d = to - from;
      if (d > 0.5) d -= 1;
      if (d < -0.5) d += 1;
      return d;
    }

    function dateFromPhaseOffset(anchorDate, anchorPhase, targetPhase) {
      const delta = phaseDelta(anchorPhase, targetPhase);
      return new Date(anchorDate.getTime() + delta * SYNODIC * 86400000);
    }

    function getPhaseName(phase) {
      if (phase < 0.03 || phase > 0.97) return 'New Moon';
      if (phase < 0.22) return 'Waxing Crescent';
      if (phase < 0.28) return 'First Quarter';
      if (phase < 0.47) return 'Waxing Gibbous';
      if (phase < 0.53) return 'Full Moon';
      if (phase < 0.72) return 'Waning Gibbous';
      if (phase < 0.78) return 'Last Quarter';
      return 'Waning Crescent';
    }

    function calcPhaseDisc(diameter, semiPhase) {
      const absPhase = Math.abs(semiPhase);
      const n = ((1 - absPhase) * diameter / 2) || 0.01;
      const discR = n / 2 + (diameter * diameter) / (8 * n);
      const left = semiPhase > 0
        ? (diameter / 2 - n)
        : (-2 * discR + diameter / 2 + n);
      return { x: left + discR, r: discR };
    }

    function appendUnlitPath(ctx, cx, cy, r, phase, illum) {
      const waxing = phase <= 0.5;
      const d = r * 2;

      if (Math.abs(illum - 0.5) < 0.002) {
        ctx.moveTo(cx, cy - r);
        ctx.arc(cx, cy, r, waxing ? -Math.PI / 2 : Math.PI / 2, waxing ? Math.PI / 2 : -Math.PI / 2, true);
        ctx.closePath();
      } else if (illum < 0.5) {
        let semiPhase = illum * 2;
        if (waxing) semiPhase *= -1;
        const disc = calcPhaseDisc(d, semiPhase);
        ctx.arc(cx - r + disc.x, cy, disc.r, 0, Math.PI * 2);
      } else {
        let semiPhase = (1 - illum) * 2;
        if (!waxing) semiPhase *= -1;
        const disc = calcPhaseDisc(d, semiPhase);
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.arc(cx - r + disc.x, cy, disc.r, 0, Math.PI * 2, true);
      }
    }

    function fillUnlitRegion(ctx, cx, cy, r, phase, illum, northern) {
      ctx.beginPath();
      if (!northern) {
        ctx.save();
        ctx.translate(cx, 0);
        ctx.scale(-1, 1);
        ctx.translate(-cx, 0);
        appendUnlitPath(ctx, cx, cy, r, phase, illum);
        ctx.restore();
      } else {
        appendUnlitPath(ctx, cx, cy, r, phase, illum);
      }
      ctx.fill();
    }

    function bakeMoonTexture(img, target, targetCtx) {
      const size = Math.min(TEXTURE_SIZE, img.naturalWidth, img.naturalHeight);
      const sameSize = img.naturalWidth === size && img.naturalHeight === size;
      target.width = target.height = size;
      targetCtx.clearRect(0, 0, size, size);
      targetCtx.imageSmoothingEnabled = !sameSize;
      if (!sameSize && 'imageSmoothingQuality' in targetCtx) {
        targetCtx.imageSmoothingQuality = 'high';
      }
      if (sameSize) {
        targetCtx.drawImage(img, 0, 0);
      } else {
        targetCtx.drawImage(img, 0, 0, size, size);
      }
      targetCtx.imageSmoothingEnabled = true;
      return true;
    }

    function darkenUnlit(ctx, cx, cy, r, phase, illum, northern, amount) {
      if (amount <= 0) return;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(0, 0, 0, ${amount})`;
      if (illum <= 0.005) {
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
      } else if (illum < 0.995) {
        fillUnlitRegion(ctx, cx, cy, r, phase, illum, northern);
      }
      ctx.restore();
    }

    function brightenLit(ctx, cx, cy, r, phase, illum, northern) {
      if (illum <= 0.005) return;

      if (!litLiftGradient) {
        litLiftGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.92);
        litLiftGradient.addColorStop(0, 'rgba(255, 248, 235, 0.2)');
        litLiftGradient.addColorStop(0.55, 'rgba(255, 248, 235, 0.07)');
        litLiftGradient.addColorStop(1, 'rgba(255, 248, 235, 0)');
      }

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (illum < 0.995) {
        if (!northern) {
          ctx.save();
          ctx.translate(cx, 0);
          ctx.scale(-1, 1);
          ctx.translate(-cx, 0);
          appendUnlitPath(ctx, cx, cy, r, phase, illum);
          ctx.restore();
        } else {
          appendUnlitPath(ctx, cx, cy, r, phase, illum);
        }
      }
      ctx.clip('evenodd');
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = litLiftGradient;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
      ctx.restore();
    }

    const MAX_STARFIELD_CSS = 4096;
    let starfieldPaint = { w: 0, h: 0 };
    let safeAreaProbe = null;
    const viewportProbes = {};

    function readSafeAreaInsets() {
      if (!safeAreaProbe) {
        safeAreaProbe = document.createElement('div');
        safeAreaProbe.style.cssText =
          'position:fixed;top:0;left:0;visibility:hidden;pointer-events:none;padding:constant(safe-area-inset-top) constant(safe-area-inset-right) constant(safe-area-inset-bottom) constant(safe-area-inset-left);padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)';
        document.body.appendChild(safeAreaProbe);
      }
      const style = getComputedStyle(safeAreaProbe);
      return {
        top: parseFloat(style.paddingTop) || 0,
        right: parseFloat(style.paddingRight) || 0,
        bottom: parseFloat(style.paddingBottom) || 0,
        left: parseFloat(style.paddingLeft) || 0,
      };
    }

    function readViewportUnit(unit) {
      if (!viewportProbes[unit]) {
        const probe = document.createElement('div');
        probe.style.cssText =
          `position:fixed;top:0;left:0;height:100${unit};visibility:hidden;pointer-events:none`;
        document.body.appendChild(probe);
        viewportProbes[unit] = probe;
      }
      return viewportProbes[unit].getBoundingClientRect().height;
    }

    function viewportCoverSize() {
      const safe = readSafeAreaInsets();
      const vv = window.visualViewport;
      const visualH = (vv?.height ?? 0) + (vv?.offsetTop ?? 0);
      const visualW = vv?.width ?? window.innerWidth;
      const screenLong = Math.max(window.screen.width, window.screen.height);
      const screenShort = Math.min(window.screen.width, window.screen.height);
      const layoutH = Math.max(
        window.innerHeight,
        document.documentElement.clientHeight,
        readViewportUnit('vh'),
        readViewportUnit('svh'),
        readViewportUnit('dvh'),
        readViewportUnit('lvh'),
        visualH,
        screenLong,
        screenShort
      );
      const layoutW = Math.max(
        window.innerWidth,
        visualW,
        document.documentElement.clientWidth,
        screenLong,
        screenShort
      );
      return {
        w: Math.min(Math.ceil(layoutW + safe.left + safe.right), MAX_STARFIELD_CSS),
        h: Math.min(Math.ceil(layoutH + safe.top + safe.bottom), MAX_STARFIELD_CSS),
        safe,
      };
    }

    function layoutStarfield(canvas, sky) {
      const { w, h, safe } = viewportCoverSize();
      if (!w || !h) return false;

      sky.style.top = `${-safe.top}px`;
      sky.style.left = `${-safe.left}px`;
      sky.style.right = 'auto';
      sky.style.bottom = 'auto';
      sky.style.width = `${w}px`;
      sky.style.height = `${h}px`;

      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      if (w === starfieldPaint.w && h === starfieldPaint.h && canvas.width > 0) return true;

      paintStarfield(canvas, w, h);
      starfieldPaint = { w, h };
      return true;
    }

    function resetStarfieldLayout(sky) {
      starfieldPaint = { w: 0, h: 0 };
      if (!sky) return;
      sky.style.width = '';
      sky.style.height = '';
      sky.style.top = '';
      sky.style.left = '';
      sky.style.right = '';
      sky.style.bottom = '';
    }

    function paintStarfield(canvas, w, h) {
      const ctx = canvas.getContext('2d');
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const sky = ctx.createRadialGradient(w * 0.38, h * 0.18, 0, w * 0.5, h * 0.55, Math.max(w, h) * 0.95);
      sky.addColorStop(0, '#121a2f');
      sky.addColorStop(0.45, '#080c16');
      sky.addColorStop(1, '#020308');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      let seed = 4187;
      const rand = () => {
        seed = (seed * 16807) % 2147483647;
        return (seed - 1) / 2147483646;
      };

      const milky = ctx.createLinearGradient(0, h * 0.15, w, h * 0.88);
      milky.addColorStop(0, 'rgba(70, 90, 150, 0)');
      milky.addColorStop(0.38, 'rgba(95, 115, 175, 0.045)');
      milky.addColorStop(0.52, 'rgba(130, 145, 210, 0.07)');
      milky.addColorStop(0.66, 'rgba(85, 100, 160, 0.04)');
      milky.addColorStop(1, 'rgba(60, 75, 120, 0)');
      ctx.fillStyle = milky;
      ctx.fillRect(0, 0, w, h);

      const nebulae = [
        [0.18, 0.28, 0.22, 120, 180, 255],
        [0.74, 0.22, 0.18, 180, 120, 220],
        [0.62, 0.78, 0.2, 100, 140, 210],
        [0.28, 0.72, 0.16, 140, 160, 230],
      ];
      for (const [nx, ny, nr, cr, cg, cb] of nebulae) {
        const g = ctx.createRadialGradient(nx * w, ny * h, 0, nx * w, ny * h, nr * Math.min(w, h));
        g.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, 0.09)`);
        g.addColorStop(0.55, `rgba(${cr}, ${cg}, ${cb}, 0.035)`);
        g.addColorStop(1, `rgba(${cr}, ${cg}, ${cb}, 0)`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      }

      function starColor(t) {
        if (t < 0.12) return [170, 200, 255];
        if (t < 0.22) return [220, 230, 255];
        if (t < 0.88) return [235, 238, 255];
        return [255, 228, 190];
      }

      function drawStar(x, y, radius, alpha, color, glow = 0) {
        if (glow > 0) {
          const halo = ctx.createRadialGradient(x, y, 0, x, y, radius * glow);
          halo.addColorStop(0, `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha * 0.55})`);
          halo.addColorStop(1, `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0)`);
          ctx.fillStyle = halo;
          ctx.fillRect(x - radius * glow, y - radius * glow, radius * glow * 2, radius * glow * 2);
        }
        ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawSparkle(x, y, size, alpha, color) {
        drawStar(x, y, size, alpha, color, 5);
        ctx.strokeStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha * 0.45})`;
        ctx.lineWidth = 0.6;
        const arm = size * 4.5;
        ctx.beginPath();
        ctx.moveTo(x - arm, y);
        ctx.lineTo(x + arm, y);
        ctx.moveTo(x, y - arm);
        ctx.lineTo(x, y + arm);
        ctx.stroke();
        const diag = arm * 0.55;
        ctx.lineWidth = 0.35;
        ctx.beginPath();
        ctx.moveTo(x - diag, y - diag);
        ctx.lineTo(x + diag, y + diag);
        ctx.moveTo(x - diag, y + diag);
        ctx.lineTo(x + diag, y - diag);
        ctx.stroke();
      }

      const area = Math.min(w * h, 1920 * 1080);
      const dustCount = Math.floor(area / 420);
      for (let i = 0; i < dustCount; i++) {
        const x = rand() * w;
        const y = rand() * h;
        const bias = Math.abs((x / w + y / h) * 0.5 - 0.48) < 0.18 ? 1.35 : 1;
        if (rand() > 0.62 * bias) continue;
        const color = starColor(rand());
        drawStar(x, y, rand() < 0.9 ? 0.45 : 0.7, 0.12 + rand() * 0.38, color);
      }

      const clusters = Array.from({ length: 7 }, () => ({
        x: 0.08 + rand() * 0.84,
        y: 0.08 + rand() * 0.84,
        spread: 0.03 + rand() * 0.07,
        count: 18 + (rand() * 30 | 0),
      }));

      for (const cluster of clusters) {
        for (let i = 0; i < cluster.count; i++) {
          const angle = rand() * Math.PI * 2;
          const dist = rand() * cluster.spread * Math.min(w, h);
          const x = cluster.x * w + Math.cos(angle) * dist;
          const y = cluster.y * h + Math.sin(angle) * dist;
          const color = starColor(rand());
          drawStar(x, y, 0.55 + rand() * 0.9, 0.25 + rand() * 0.45, color, rand() < 0.2 ? 2.5 : 0);
        }
      }

      const midCount = Math.floor(area / 1800);
      for (let i = 0; i < midCount; i++) {
        const x = rand() * w;
        const y = rand() * h;
        const color = starColor(rand());
        drawStar(x, y, 0.75 + rand() * 0.9, 0.3 + rand() * 0.5, color, rand() < 0.15 ? 2 : 0);
      }

      const brightCount = Math.floor(area / 12000) + 12;
      for (let i = 0; i < brightCount; i++) {
        const x = rand() * w;
        const y = rand() * h;
        const color = starColor(rand());
        const size = 1.1 + rand() * 1.4;
        if (rand() < 0.28) drawSparkle(x, y, size, 0.55 + rand() * 0.35, color);
        else drawStar(x, y, size, 0.45 + rand() * 0.4, color, 3.5 + rand() * 2);
      }

      ctx.fillStyle = 'rgba(255, 255, 255, 0.012)';
      const speckCount = Math.min(900, Math.floor(area / 2000));
      for (let i = 0; i < speckCount; i++) {
        ctx.fillRect(rand() * w, rand() * h, 1, 1);
      }
    }

    let limbGradient = null;
    let litLiftGradient = null;

    function drawMoon(ctx, textureReady, phase, illum) {
      if (textureReady) {
        lastPhase = phase;
        lastIllum = illum;
      }
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      if (!w || !h) return;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(w, h) / 2;
      const shadow = 1 - EARTHSHINE;

      ctx.clearRect(0, 0, w, h);

      if (!textureReady) {
        ctx.fillStyle = '#111114';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      const side = textureCanvas.width;

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();
      const dest = r * 2;
      const downscale = dest < side - 2;
      ctx.imageSmoothingEnabled = downscale;
      if (downscale && 'imageSmoothingQuality' in ctx) {
        ctx.imageSmoothingQuality = 'high';
      }
      ctx.drawImage(textureCanvas, 0, 0, side, side, cx - r, cy - r, dest, dest);
      ctx.imageSmoothingEnabled = true;
      ctx.restore();

      darkenUnlit(ctx, cx, cy, r, phase, illum, northernHemisphere, shadow);

      if (!limbGradient) {
        limbGradient = ctx.createRadialGradient(cx, cy, r * 0.86, cx, cy, r);
        limbGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
        limbGradient.addColorStop(1, 'rgba(0, 0, 0, 0.06)');
      }
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = limbGradient;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
      ctx.restore();

      brightenLit(ctx, cx, cy, r, phase, illum, northernHemisphere);
    }

    function resizeMoonCanvas(canvas) {
      const size = computeRenderSize();
      if (canvas.width === size && canvas.height === size) return;
      canvas.width = size;
      canvas.height = size;
      limbGradient = null;
      litLiftGradient = null;
    }

    function init() {
      const sky = document.getElementById('sky');
      const starfield = document.getElementById('starfield');
      const canvas = document.getElementById('moon-canvas');
      const moonCtx = canvas.getContext('2d', { alpha: true, desynchronized: true });
      resizeMoonCanvas(canvas);
      const illumEl = document.getElementById('illumination');
      const ageEl = document.getElementById('moon-age');
      const daysToFullEl = document.getElementById('days-to-full');
      const phaseNameEl = document.getElementById('phase-name');
      const slider = document.getElementById('phase-slider');
      const sliderLabel = document.getElementById('slider-label');
      const dateEl = document.getElementById('moon-date');
      const resetSlider = document.getElementById('reset-slider');
      const hemNorth = document.getElementById('hem-north');
      const hemSouth = document.getElementById('hem-south');

      let textureReady = false;
      let previewMode = false;
      let currentDate = new Date();
      let sliderRaf = 0;
      let pendingPreviewPhase = null;
      let pendingPreviewDate = null;
      let sliderAnchorDate = null;
      let sliderAnchorPhase = 0;
      let zoomRaf = 0;

      async function loadMoonTexture() {
        try {
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = () => img.naturalWidth ? resolve() : reject(new Error('empty image'));
            img.onerror = () => reject(new Error('failed to load moon.jpg'));
            img.src = MOON_SRC;
          });
          if (img.decode) await img.decode();
          textureReady = bakeMoonTexture(img, textureCanvas, textureCtx);
        } catch (_) {
          textureReady = false;
        }
        resizeMoonCanvas(canvas);
        syncLiveDisplay();
      }

      syncLiveDisplay();
      loadMoonTexture();

      let viewportTimer = 0;
      let starfieldTimer = 0;
      let orientationTimer = 0;
      let suppressMoonUntil = 0;

      function applyMoonLayout() {
        requestAnimationFrame(() => {
          resizeMoonCanvas(canvas);
          if (textureReady) drawMoon(moonCtx, textureReady, lastPhase, lastIllum);
        });
      }

      function scheduleMoonLayout(delay = 150) {
        if (Date.now() < suppressMoonUntil) return;
        clearTimeout(viewportTimer);
        viewportTimer = setTimeout(applyMoonLayout, delay);
      }

      const STARFIELD_RECHECKS_MS = [0, 50, 150, 350, 600, 1000];

      function runStarfieldLayout() {
        requestAnimationFrame(() => {
          if (!layoutStarfield(starfield, sky)) {
            starfieldTimer = setTimeout(runStarfieldLayout, 120);
          }
        });
      }

      function scheduleStarfield(delay = 100) {
        clearTimeout(starfieldTimer);
        if (delay <= 0) runStarfieldLayout();
        else starfieldTimer = setTimeout(runStarfieldLayout, delay);
      }

      function bootStarfield() {
        resetStarfieldLayout(sky);
        STARFIELD_RECHECKS_MS.forEach((ms) => setTimeout(() => runStarfieldLayout(), ms));
      }

      function onViewportChange() {
        scheduleStarfield(100);
        scheduleMoonLayout(200);
      }

      function onOrientationChange() {
        resetStarfieldLayout(sky);
        clearTimeout(viewportTimer);
        suppressMoonUntil = Date.now() + 500;
        clearTimeout(orientationTimer);
        STARFIELD_RECHECKS_MS.forEach((ms) => setTimeout(() => runStarfieldLayout(), ms));
        scheduleMoonLayout(200);
        orientationTimer = setTimeout(() => {
          suppressMoonUntil = 0;
          applyMoonLayout();
          if (moonZoom > 1.01) {
            moonZoomOrigin = null;
            applyMoonZoom();
          }
        }, 350);
      }

      bootStarfield();
      applyMoonLayout();
      window.addEventListener('resize', onViewportChange);
      window.addEventListener('orientationchange', onOrientationChange);
      window.matchMedia('(orientation: portrait), (orientation: landscape)').addEventListener('change', onOrientationChange);
      window.visualViewport?.addEventListener('resize', onViewportChange);
      window.addEventListener('pageshow', (event) => {
        bootStarfield();
        scheduleMoonLayout(event.persisted ? 0 : 200);
        syncLiveDisplay();
      });
      drawMoon(moonCtx, false, 0, 0);

      function updateStats(phase, illumination) {
        phaseNameEl.textContent = getPhaseName(phase);
        illumEl.textContent = (illumination * 100).toFixed(1);
        ageEl.textContent = (phase * SYNODIC).toFixed(1);
        daysToFullEl.textContent = daysToFull(phase).toFixed(1);
      }

      function updateDisplay(phase, illumination) {
        updateStats(phase, illumination);
        drawMoon(moonCtx, textureReady, phase, illumination);
      }

      function updateDateDisplay(date) {
        dateEl.textContent = formatDate(date);
      }

      function ensureSliderAnchor() {
        if (!sliderAnchorDate) {
          sliderAnchorDate = currentDate;
          sliderAnchorPhase = previewMode
            ? Number(slider.value) / 1000
            : getMoonData(currentDate).phase;
        }
      }

      function queuePreview(phase, date) {
        pendingPreviewPhase = phase;
        pendingPreviewDate = date;
        if (sliderRaf) return;
        sliderRaf = requestAnimationFrame(() => {
          sliderRaf = 0;
          if (pendingPreviewPhase == null) return;
          const previewPhase = pendingPreviewPhase;
          const previewDate = pendingPreviewDate;
          pendingPreviewPhase = null;
          pendingPreviewDate = null;
          const illum = phaseIllum(previewPhase);
          updateStats(previewPhase, illum);
          drawMoon(moonCtx, textureReady, previewPhase, illum);
          if (previewDate) updateDateDisplay(previewDate);
        });
      }

      function updateLiveButton() {
        resetSlider.textContent = previewMode ? 'Use live' : 'Live';
        resetSlider.classList.toggle('is-preview', previewMode);
        resetSlider.classList.toggle('is-live', !previewMode);
      }

      function syncLiveDisplay({ force = false } = {}) {
        if (!force && previewMode) return;
        if (force) previewMode = false;
        const now = new Date();
        currentDate = now;
        const data = getMoonData(now);
        slider.value = Math.round(data.phase * 1000);
        sliderLabel.textContent = 'Live phase';
        updateDateDisplay(now);
        updateDisplay(data.phase, data.fraction);
        updateLiveButton();
      }

      function setHemisphere(isNorth) {
        northernHemisphere = isNorth;
        hemNorth.classList.toggle('active', isNorth);
        hemSouth.classList.toggle('active', !isNorth);
        if (textureReady) drawMoon(moonCtx, textureReady, lastPhase, lastIllum);
      }

      slider.addEventListener('pointerdown', ensureSliderAnchor);
      slider.addEventListener('pointerup', () => { sliderAnchorDate = null; });
      slider.addEventListener('pointercancel', () => { sliderAnchorDate = null; });

      slider.addEventListener('input', () => {
        ensureSliderAnchor();
        previewMode = true;
        const phase = Number(slider.value) / 1000;
        const date = dateFromPhaseOffset(sliderAnchorDate, sliderAnchorPhase, phase);
        currentDate = date;
        sliderLabel.textContent = `Preview ${(phase * 100).toFixed(1)}% through cycle`;
        updateLiveButton();
        queuePreview(phase, date);
      });

      resetSlider.addEventListener('click', () => syncLiveDisplay({ force: true }));

      hemNorth.addEventListener('click', () => setHemisphere(true));
      hemSouth.addEventListener('click', () => setHemisphere(false));

      const moonScene = document.querySelector('.moon-scene');
      let pinchStartDist = 0;
      let pinchStartZoom = 1;
      let pinching = false;
      let moonZoomOrigin = null;

      function touchSpan(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.hypot(dx, dy);
      }

      function captureMoonZoomOrigin() {
        if (!moonScene) return;
        const rect = moonScene.getBoundingClientRect();
        moonZoomOrigin = {
          cx: rect.left + rect.width / 2,
          cy: rect.top + rect.height / 2,
          size: rect.width,
        };
      }

      function clearMoonZoomStyles() {
        if (!moonScene) return;
        moonZoomOrigin = null;
        moonScene.style.position = '';
        moonScene.style.left = '';
        moonScene.style.top = '';
        moonScene.style.width = '';
        moonScene.style.height = '';
        moonScene.style.maxHeight = '';
        moonScene.style.transform = '';
      }

      function applyMoonZoom() {
        if (!moonScene) return;
        const zoomed = moonZoom > 1.01;
        moonScene.classList.toggle('is-zoomed', zoomed);
        document.body.classList.toggle('moon-zoomed', zoomed);

        if (zoomed) {
          if (!moonZoomOrigin) captureMoonZoomOrigin();
          if (moonZoomOrigin) {
            moonScene.style.position = 'fixed';
            moonScene.style.left = `${moonZoomOrigin.cx}px`;
            moonScene.style.top = `${moonZoomOrigin.cy}px`;
            moonScene.style.width = `${moonZoomOrigin.size}px`;
            moonScene.style.height = `${moonZoomOrigin.size}px`;
            moonScene.style.maxHeight = 'none';
            moonScene.style.transform = `translate(-50%, -50%) scale(${moonZoom})`;
          }
        } else {
          clearMoonZoomStyles();
        }

        if (zoomRaf) return;
        zoomRaf = requestAnimationFrame(() => {
          zoomRaf = 0;
          resizeMoonCanvas(canvas);
          if (textureReady) drawMoon(moonCtx, textureReady, lastPhase, lastIllum);
        });
      }

      document.addEventListener('touchstart', (event) => {
        if (event.touches.length === 2) {
          pinching = true;
          pinchStartDist = touchSpan(event.touches);
          pinchStartZoom = moonZoom;
          if (moonZoom <= 1.01) captureMoonZoomOrigin();
        }
      }, { passive: true });

      document.addEventListener('touchmove', (event) => {
        if (!pinching || event.touches.length !== 2) return;
        event.preventDefault();
        const span = touchSpan(event.touches);
        if (!pinchStartDist) return;
        moonZoom = Math.min(MAX_MOON_ZOOM, Math.max(MIN_MOON_ZOOM, pinchStartZoom * (span / pinchStartDist)));
        applyMoonZoom();
      }, { passive: false });

      document.addEventListener('touchend', (event) => {
        if (event.touches.length < 2) {
          pinching = false;
          pinchStartDist = 0;
        }
      }, { passive: true });

      let gestureStartZoom = 1;
      document.addEventListener('gesturestart', (event) => {
        event.preventDefault();
        gestureStartZoom = moonZoom;
      }, { passive: false });
      document.addEventListener('gesturechange', (event) => {
        event.preventDefault();
        moonZoom = Math.min(MAX_MOON_ZOOM, Math.max(MIN_MOON_ZOOM, gestureStartZoom * event.scale));
        applyMoonZoom();
      }, { passive: false });
      document.addEventListener('gestureend', (event) => {
        event.preventDefault();
      }, { passive: false });

      document.addEventListener('wheel', (event) => {
        if (!event.ctrlKey) return;
        event.preventDefault();
        moonZoom = Math.min(
          MAX_MOON_ZOOM,
          Math.max(MIN_MOON_ZOOM, moonZoom - event.deltaY * 0.012)
        );
        applyMoonZoom();
      }, { passive: false });

      let liveRefreshTimer = null;
      function startLiveRefresh() {
        if (liveRefreshTimer) return;
        liveRefreshTimer = setInterval(() => syncLiveDisplay(), 60_000);
      }
      function stopLiveRefresh() {
        if (!liveRefreshTimer) return;
        clearInterval(liveRefreshTimer);
        liveRefreshTimer = null;
      }
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopLiveRefresh();
        else {
          syncLiveDisplay();
          startLiveRefresh();
        }
      });
      startLiveRefresh();
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
